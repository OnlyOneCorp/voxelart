:root{
  --bg:#FAFAF8; --ink:#3D4248; --ink-soft:#8A8F94; --accent:#B5342E;
  --line:#E8E7E2; --card:#FFFFFF;
  --v-red:#E5484D; --v-org:#F76B15; --v-yel:#FFC53D; --v-grn:#46A758;

}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;max-width:960px;margin:0 auto}
.brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink)}
.brand svg{width:22px;height:22px}
.brand span{font-weight:700;font-size:15px;letter-spacing:-.02em}
.lang-btn{font-size:13px;font-weight:600;color:var(--ink-soft);border:1px solid var(--line);border-radius:20px;padding:6px 14px;background:var(--card);transition:.2s}
.lang-btn:hover{color:var(--ink);border-color:var(--ink-soft)}

/* ── Screens ── */
.screen{display:none;max-width:960px;margin:0 auto;padding:0 20px 60px}
.screen.on{display:block}

/* ── Cover / Start ── */
.hero{position:relative;text-align:center;padding:56px 0 36px;overflow:visible}
.hero h1{font-size:clamp(34px,7vw,58px);font-weight:900;letter-spacing:-.04em;line-height:1.08}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{margin-top:14px;font-size:16px;color:var(--ink-soft);font-weight:500}
.cube{position:absolute;width:26px;height:26px;border-radius:5px;opacity:.9;animation:float 5s ease-in-out infinite;box-shadow:0 6px 14px rgba(61,66,72,.15)}
.cube::after{content:'';position:absolute;inset:0;border-radius:5px;background:linear-gradient(135deg,rgba(255,255,255,.45),rgba(0,0,0,.12))}
@keyframes float{0%,100%{transform:translateY(0) rotate(var(--r,8deg))}50%{transform:translateY(-14px) rotate(calc(var(--r,8deg) + 6deg))}}
@media (prefers-reduced-motion:reduce){.cube{animation:none}}

.grid-ch{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:26px}
.ch-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 14px;text-align:center;transition:.2s;position:relative}
.ch-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(61,66,72,.1);border-color:#d8d7d2}
.ch-card .emo{font-size:34px}
.ch-card h3{font-size:15px;font-weight:700;margin-top:8px;letter-spacing:-.02em}
.ch-card .meta{font-size:12px;color:var(--ink-soft);margin-top:4px}
.ch-card .best{position:absolute;top:10px;right:10px;font-size:11px;font-weight:700;color:var(--accent);background:rgba(181,52,46,.08);border-radius:10px;padding:3px 8px}
.ch-card.free{background:linear-gradient(160deg,#3D4248,#575D64);color:#fff;border:none}
.ch-card.free .meta{color:rgba(255,255,255,.65)}

/* ── Game ── */
.game-top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0 12px;flex-wrap:wrap}
.game-top .title{font-weight:800;font-size:17px;letter-spacing:-.02em}
.game-top .sub{font-size:12px;color:var(--ink-soft);font-weight:600}
.pill{font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--card);border-radius:20px;padding:7px 14px;transition:.2s}
.pill:hover{border-color:var(--ink-soft)}
.pill.act{background:var(--ink);color:#fff;border-color:var(--ink)}
#stage{position:relative;border-radius:22px;overflow:hidden;background:linear-gradient(180deg,#F4F4F1,#ECECE8);border:1px solid var(--line);touch-action:none}
#stage canvas{display:block;width:100%;height:100%}
#hint{position:absolute;top:12px;left:0;right:0;text-align:center;pointer-events:none;font-size:12.5px;font-weight:600;color:var(--ink-soft);opacity:1;transition:opacity .6s}
#timer{position:absolute;top:12px;right:14px;font-size:12.5px;font-weight:700;color:var(--ink-soft);font-variant-numeric:tabular-nums}

/* palette + tools */
.palette{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.swatch{width:34px;height:34px;border-radius:10px;border:2.5px solid transparent;transition:.15s;box-shadow:inset 0 -3px 0 rgba(0,0,0,.14)}
.swatch.sel{border-color:var(--ink);transform:scale(1.12)}
.tools{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.done-btn{display:block;margin:18px auto 0;background:var(--accent);color:#fff;font-size:16px;font-weight:800;border-radius:26px;padding:14px 44px;letter-spacing:-.01em;box-shadow:0 8px 20px rgba(181,52,46,.3);transition:.2s}

.result .msg{font-size:17px;font-weight:600;margin-top:10px}
.result .detail{font-size:13px;color:var(--ink-soft);margin-top:6px}
#cardPrev{margin:22px auto 0;max-width:340px;width:100%;border-radius:20px;box-shadow:0 14px 34px rgba(61,66,72,.16)}
.r-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px}
.r-btn{border-radius:24px;padding:12px 26px;font-size:14.5px;font-weight:700;transition:.2s}
.r-btn.primary{background:var(--ink);color:#fff}
.r-btn.ghost{border:1.5px solid var(--line);background:var(--card)}
.r-btn:hover{transform:translateY(-2px)}
.aff{margin:30px auto 0;max-width:420px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;text-align:left;display:none}
.aff.on{display:block}
.aff a{color:var(--accent);font-weight:700;text-decoration:none;font-size:14px}
.aff p{font-size:12px;color:var(--ink-soft);margin-top:4px}

/* ── Footer ── */
footer{max-width:960px;margin:0 auto;padding:26px 20px 42px;border-top:1px solid var(--line);text-align:center}
footer .links{font-size:13px;color:var(--ink-soft)}
footer a{color:var(--ink-soft);text-decoration:none}
footer a:hover{color:var(--ink)}
.disclosure{font-size:11px;color:#B0B3B6;margin-top:10px;display:none}
.disclosure.on{display:block}

/* ── Consent ── */
#consent{position:fixed;left:16px;right:16px;bottom:16px;max-width:520px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;box-shadow:0 16px 40px rgba(61,66,72,.18);display:none;z-index:50}
#consent.on{display:block}
#consent p{font-size:13.5px;line-height:1.55;color:var(--ink)}
#consent .c-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
#consent button{border-radius:18px;padding:9px 18px;font-size:13.5px;font-weight:700}
#consent .ok{background:var(--ink);color:#fff}
#consent .no{border:1.5px solid var(--line)}
#notice{position:fixed;left:16px;right:16px;bottom:16px;max-width:420px;margin:0 auto;background:rgba(61,66,72,.94);color:#fff;border-radius:14px;padding:12px 16px;font-size:12.5px;display:none;z-index:50;backdrop-filter:blur(6px)}
#notice.on{display:flex;align-items:center;gap:10px;justify-content:space-between}
#notice button{color:#fff;font-weight:800;font-size:16px;line-height:1;padding:4px}

@media (max-width:520px){
  .grid-ch{grid-template-columns:repeat(2,1fr)}
  .swatch{width:38px;height:38px}
}
</style>

<script>

const I18N = {

/* ═════════ Consent Mode v2 ═════════ */
const isEEA = /^(Europe\/|Atlantic\/(Canary|Madeira|Azores|Reykjavik))/.test((Intl.DateTimeFormat().resolvedOptions().timeZone)||'');
function grantAnalytics(){ gtag('consent','update',{analytics_storage:'granted'}); }

/* ═════════ Voxel data ═════════ */
const N = 8; // 8×8×8 grid
const COLORS = ['#E5484D','#F76B15','#FFC53D','#46A758','#4C82FB','#8E4EC6','#8D5B3F','#F0EFEA','#6E7076'];
const K = (x,y,z)=>x+','+y+','+z;
function box(m,x1,y1,z1,x2,y2,z2,c){ for(let x=x1;x<=x2;x++)for(let y=y1;y<=y2;y++)for(let z=z1;z<=z2;z++) m.set(K(x,y,z),c); }
function put(m,x,y,z,c){ m.set(K(x,y,z),c); }
/* 2D 패턴 헬퍼: rows는 위→아래, cmap의 문자만 블록으로 배치 */
function pat(m,rows,cmap,z,x0){ z=z==null?3:z; x0=x0||0;
  const h=rows.length;
  rows.forEach((s,i)=>{ const y=h-1-i;
    for(let x=0;x<s.length;x++){ const c=cmap[s[x]]; if(c!==undefined) put(m,x0+x,y,z,c); } });
}

function mFlower(){ const m=new Map();
  box(m,3,0,3,3,2,3,3); put(m,2,1,3,3); put(m,4,2,3,3);
  put(m,3,4,3,2); put(m,3,5,3,5); put(m,3,3,3,5); put(m,2,4,3,5); put(m,4,4,3,5); return m; }
function mDuck(){ const m=new Map();
  box(m,2,0,3,5,1,4,2); box(m,1,2,3,2,3,4,2);
  put(m,0,2,3,1); put(m,0,2,4,1); put(m,6,1,3,2); put(m,6,1,4,2); return m; }
function mHeart(){ const m=new Map(); const rows=[
  [5,'.XX.XX.'],[4,'XXXXXXX'],[3,'XXXXXXX'],[2,'.XXXXX.'],[1,'..XXX..'],[0,'...X...']];
  rows.forEach(([y,s])=>{ for(let x=0;x<7;x++) if(s[x]==='X') put(m,x,y,3,0); }); return m; }
function mRocket(){ const m=new Map();
  box(m,3,1,3,4,4,4,8); box(m,3,5,3,4,5,4,0);
  put(m,2,1,3,0); put(m,2,1,4,0); put(m,5,1,3,0); put(m,5,1,4,0);
  box(m,3,0,3,4,0,4,1); return m; }

  '...RR...','..RRRR..','.RRRRRR.','.WWWWWW.','.WWNNWW.','.WWNNWW.'],CM); return m; }

/* ═════════ Three.js scene ═════════ */
let renderer, scene, camera, raycaster, floorMesh;
let voxels = new Map();        // key → {mesh, color}
let ghostGroup = null, ghostOn = true;
let target = null, current = null;   // current = challenge obj or 'free'
let selColor = 0, mode = 'build';
let history = [];
let startTime = 0, timerIv = null, placedAny = false;
const CENTER = new THREE.Vector3(N/2, 0, N/2);
let sph = { r: 16, theta: Math.PI/4, phi: Math.PI/3.2 };

function initThree(){
  const stage = document.getElementById('stage');
  const w = stage.clientWidth, h = Math.min(w*0.82, window.innerHeight*0.55);
  stage.style.height = h+'px';
  renderer = new THREE.WebGLRenderer({antialias:true, preserveDrawingBuffer:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(w,h);
  stage.insertBefore(renderer.domElement, stage.firstChild);
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(46, w/h, 0.1, 200);
  raycaster = new THREE.Raycaster();
  scene.add(new THREE.AmbientLight(0xffffff, .72));
  const dir = new THREE.DirectionalLight(0xffffff, .6); dir.position.set(10,18,8); scene.add(dir);
  const dir2 = new THREE.DirectionalLight(0xffffff, .25); dir2.position.set(-8,10,-10); scene.add(dir2);
  // floor
  const fg = new THREE.PlaneGeometry(N,N); fg.rotateX(-Math.PI/2);
  floorMesh = new THREE.Mesh(fg, new THREE.MeshBasicMaterial({color:0xEDEDE9}));
  floorMesh.position.set(N/2, -0.001, N/2); scene.add(floorMesh);
  const grid = new THREE.GridHelper(N, N, 0xD5D4CF, 0xDDDCD7);
  grid.position.set(N/2, 0, N/2); scene.add(grid);
  bindControls(stage);
  animate();
  window.addEventListener('resize', onResize);
}
function onResize(){
  const stage = document.getElementById('stage');
  if(!renderer || !stage.clientWidth) return;
  const w = stage.clientWidth, h = Math.min(w*0.82, window.innerHeight*0.55);
  stage.style.height = h+'px';
  renderer.setSize(w,h); camera.aspect = w/h; camera.updateProjectionMatrix();
}
function animate(){
  requestAnimationFrame(animate);
  sph.phi = Math.max(0.25, Math.min(Math.PI/2 - 0.05, sph.phi));
  sph.r = Math.max(8, Math.min(30, sph.r));
  camera.position.set(
    CENTER.x + sph.r*Math.sin(sph.phi)*Math.cos(sph.theta),
    CENTER.y + sph.r*Math.cos(sph.phi) + 2,
    CENTER.z + sph.r*Math.sin(sph.phi)*Math.sin(sph.theta)
  );
  camera.lookAt(CENTER.x, 2.4, CENTER.z);
  renderer.render(scene, camera);
}

/* controls: drag rotate, pinch/wheel zoom, tap place */
function bindControls(el){
  let ptrs = new Map(), moved = 0, startDist = 0;
  el.addEventListener('pointerdown', e=>{
    ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY}); moved = 0;
    if(ptrs.size===2){ const a=[...ptrs.values()]; startDist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y); }
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', e=>{
    if(!ptrs.has(e.pointerId)) return;
    const p = ptrs.get(e.pointerId);
    const dx = e.clientX-p.x, dy = e.clientY-p.y;
    moved += Math.abs(dx)+Math.abs(dy);
    if(ptrs.size===1){ sph.theta += dx*0.008; sph.phi -= dy*0.008; }
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===2){
      const a=[...ptrs.values()]; const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
      if(startDist) sph.r *= startDist/d; startDist = d;
    }
  });
  el.addEventListener('pointerup', e=>{
    ptrs.delete(e.pointerId);
    if(ptrs.size===0 && moved < 9) tap(e);
  });
  el.addEventListener('pointercancel', e=>ptrs.delete(e.pointerId));
  el.addEventListener('wheel', e=>{ e.preventDefault(); sph.r *= (1 + Math.sign(e.deltaY)*0.08); }, {passive:false});
}
function tap(e){
  const rect = renderer.domElement.getBoundingClientRect();
  const ndc = new THREE.Vector2(
    ((e.clientX-rect.left)/rect.width)*2-1,
    -((e.clientY-rect.top)/rect.height)*2+1
  );
  raycaster.setFromCamera(ndc, camera);
  const meshes = [...voxels.values()].map(v=>v.mesh);
  const hits = raycaster.intersectObjects([...meshes, floorMesh]);
  if(!hits.length) return;
  const hit = hits[0];
  if(mode==='erase'){
    if(hit.object===floorMesh) return;
    const key = hit.object.userData.key;
    const col = voxels.get(key).color;
    removeVoxel(key); history.push({t:'remove', key, color:col});
    return;
  }
  let x,y,z;
  if(hit.object===floorMesh){
    x=Math.floor(hit.point.x); y=0; z=Math.floor(hit.point.z);
  }else{
    const p = hit.object.position, n = hit.face.normal;
    x = Math.round(p.x-0.5+n.x); y = Math.round(p.y-0.5+n.y); z = Math.round(p.z-0.5+n.z);
  }
  if(x<0||x>=N||y<0||y>=N||z<0||z>=N) return;
  const key = K(x,y,z);
  if(voxels.has(key)) return;
  addVoxel(x,y,z,selColor); history.push({t:'add', key});
  if(!placedAny){ placedAny=true; startTime=Date.now(); timerIv=setInterval(updTimer,500);
    document.getElementById('hint').style.opacity=0; }
}
const geoBox = new THREE.BoxGeometry(0.98,0.98,0.98);
const geoEdge = new THREE.EdgesGeometry(geoBox);
const mats = COLORS.map(c=>new THREE.MeshLambertMaterial({color:c}));
const edgeMat = new THREE.LineBasicMaterial({color:0x3D4248, transparent:true, opacity:0.16});
function addVoxel(x,y,z,c){
  const mesh = new THREE.Mesh(geoBox, mats[c]);
  mesh.position.set(x+0.5, y+0.5, z+0.5);
  mesh.userData.key = K(x,y,z);
  mesh.add(new THREE.LineSegments(geoEdge, edgeMat));
  scene.add(mesh);
  voxels.set(K(x,y,z), {mesh, color:c});
}
function removeVoxel(key){
  const v = voxels.get(key); if(!v) return;
  scene.remove(v.mesh); voxels.delete(key);
}
function undo(){
  const a = history.pop(); if(!a) return;
  if(a.t==='add') removeVoxel(a.key);
  else{ const [x,y,z]=a.key.split(',').map(Number); addVoxel(x,y,z,a.color); }
}
function resetVoxels(){
  [...voxels.keys()].forEach(removeVoxel); history=[];
}
function buildGhost(){
  if(ghostGroup){ scene.remove(ghostGroup); ghostGroup=null; }
  if(!target) return;
  ghostGroup = new THREE.Group();
  const g = new THREE.BoxGeometry(0.82,0.82,0.82);
  target.forEach((c,key)=>{
    const [x,y,z]=key.split(',').map(Number);
    const m = new THREE.Mesh(g, new THREE.MeshLambertMaterial({color:COLORS[c], transparent:true, opacity:0.26, depthWrite:false}));
    m.position.set(x+0.5,y+0.5,z+0.5); m.raycast=()=>{}; ghostGroup.add(m);
  });
  ghostGroup.visible = ghostOn;
  scene.add(ghostGroup);
}
function toggleGhost(){
  ghostOn = !ghostOn;
  if(ghostGroup) ghostGroup.visible = ghostOn;
  document.getElementById('ghostBtn').textContent = ghostOn ? t('ghostOff') : t('ghostOn');
}

/* ═════════ Game flow ═════════ */
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on')); document.getElementById(id).classList.add('on'); }
function startGame(ch){
  current = ch || 'free';
  target = ch ? ch.make() : null;
  show('scrGame');
  if(!renderer) initThree(); else onResize();
  resetVoxels();
  ghostOn = true; buildGhost();
  document.getElementById('ghostBtn').style.display = ch?'':'none';
  placedAny=false; clearInterval(timerIv); document.getElementById('timer').textContent='0:00';
  document.getElementById('hint').style.opacity=1;
  setMode('build'); selColor = ch ? [...target.values()][0] : 0; renderPalette();
  updateGameHeader();
  sph = { r: 16, theta: Math.PI/4, phi: Math.PI/3.2 };
  track('challenge_start',{challenge: ch?ch.id:'free'});
}
function updateGameHeader(){
  document.getElementById('gTitle').textContent = current==='free' ? t('freeTitle')
    : (current.emo+' '+(lang==='ko'?current.ko:current.en));
  document.getElementById('gSub').textContent = current==='free' ? t('freeMeta')
    : `${t('target')}: ${target.size} ${t('blocks')}`;
  document.getElementById('doneBtn').textContent = current==='free' ? t('doneFree') : t('done');
  document.getElementById('ghostBtn').textContent = ghostOn ? t('ghostOff') : t('ghostOn');
}
function renderPalette(){
  const p = document.getElementById('palette'); p.innerHTML='';
  COLORS.forEach((c,i)=>{
    const b=document.createElement('button'); b.className='swatch'+(i===selColor?' sel':'');
    b.style.background=c; b.setAttribute('aria-label','color '+i);
    b.onclick=()=>{ selColor=i; setMode('build'); renderPalette(); };
    p.appendChild(b);
  });
}
function setMode(m){
  mode=m;
  document.getElementById('mBuild').classList.toggle('act', m==='build');
  document.getElementById('mErase').classList.toggle('act', m==='erase');
}
function exitGame(){ clearInterval(timerIv); show('scrStart'); renderChallenges(); }
function retry(){ startGame(current==='free'?null:current); }
function updTimer(){
  const s=Math.floor((Date.now()-startTime)/1000);
  document.getElementById('timer').textContent = Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}
function elapsedStr(){
  if(!placedAny) return '0:00';
  const s=Math.floor((Date.now()-startTime)/1000);
  return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}

/* ═════════ Scoring & result ═════════ */
function finish(){
  clearInterval(timerIv);
  const time = elapsedStr();
  let score=null, match=0, extra=0;
  if(current!=='free'){
    let posOnly=0;
    target.forEach((c,key)=>{
      const v = voxels.get(key);
      if(v){ if(v.color===c) match++; else posOnly++; }
    });
    voxels.forEach((v,key)=>{ if(!target.has(key)) extra++; });
    score = Math.max(0, Math.min(100, Math.round((match + 0.5*posOnly - 0.3*extra)/target.size*100)));
    const id=current.id, prev=Number(bestOf(id)||0);
    if(score>prev) localStorage.setItem('oo_voxel_best_'+id, score);
  }
  // capture BEFORE switching screens
  if(ghostGroup) ghostGroup.visible=false;
  renderer.render(scene,camera);
  const shot = renderer.domElement.toDataURL('image/png');
  if(ghostGroup) ghostGroup.visible=ghostOn;

  show('scrResult');
  const stars = score===null?'' : score>=100?'👑👑👑' : score>=90?'★★★' : score>=70?'★★☆' : score>=50?'★☆☆':'☆☆☆';
  document.getElementById('rStars').textContent = stars;
  document.getElementById('rScore').innerHTML = score===null ? '🎨' : score+'<small>%</small>';
  document.getElementById('rMsg').textContent = score===null ? t('freeMsg') : t('msgs').find(m=>score>=m[0])[1];
  document.getElementById('rDetail').textContent = score===null
    ? t('detailFree')(voxels.size, time)
    : t('detail')(match, target.size, extra, time);
  document.getElementById('affKo').classList.toggle('on', lang==='ko');
  document.getElementById('affEn').classList.toggle('on', lang!=='ko');
  drawCard(shot, score, time);
  track('challenge_complete',{challenge: current==='free'?'free':current.id, score: score??-1});
}
function rr(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function drawCard(shotUrl, score, time){
  const cv = document.getElementById('cardPrev'), ctx = cv.getContext('2d');
  ctx.fillStyle='#FAFAF8'; ctx.fillRect(0,0,1080,1080);
  // header
  ctx.fillStyle='#3D4248';
  ctx.font='700 34px Pretendard, sans-serif'; ctx.textAlign='left';
  ctx.beginPath(); ctx.arc(72,74,22,0,Math.PI*2); ctx.lineWidth=12; ctx.strokeStyle='#3D4248'; ctx.stroke();
  rr(ctx,64,96,16,42,8); ctx.fill();
  ctx.fillText('OnlyOne', 116, 86);
  ctx.textAlign='right'; ctx.font='600 30px Pretendard, sans-serif'; ctx.fillStyle='#8A8F94';
  ctx.fillText(t('cardChallenge'), 1010, 84);
  // screenshot
  const img = new Image();
  img.onload = ()=>{
    ctx.save(); rr(ctx,90,150,900,560,32); ctx.clip();
    ctx.fillStyle='#EFEFEB'; ctx.fillRect(90,150,900,560);
    const ar = img.width/img.height, tw=900, th=tw/ar;
    ctx.drawImage(img, 90, 150+(560-th)/2, tw, th);
    ctx.restore();
    ctx.textAlign='center';
    const title = current==='free' ? t('freeTitle') : (current.emo+' '+(lang==='ko'?current.ko:current.en));
    ctx.fillStyle='#3D4248'; ctx.font='800 52px Pretendard, sans-serif';
    ctx.fillText(title, 540, 800);
    if(score!==null){
      ctx.fillStyle='#B5342E'; ctx.font='900 120px Pretendard, sans-serif';
      ctx.fillText(score+'%', 540, 930);
      ctx.fillStyle='#8A8F94'; ctx.font='600 32px Pretendard, sans-serif';
      ctx.fillText(t('cardScore')+' · '+time, 540, 980);
    }else{
      ctx.fillStyle='#8A8F94'; ctx.font='600 36px Pretendard, sans-serif';
      ctx.fillText(voxels.size+' '+t('blocks')+' · '+time, 540, 900);
    }
    ctx.fillStyle='#B5342E'; ctx.font='700 30px Pretendard, sans-serif';
    ctx.fillText(t('cardTry')+'  '+location.host, 540, 1038);
  };
  img.src = shotUrl;
}
async function shareCard(){
  track('share_card',{});
  const cv=document.getElementById('cardPrev');
  cv.toBlob(async blob=>{
    const file = new File([blob],'voxel-art.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:'Voxel Art Challenge', url:location.href}); return; }catch(e){}
    }
    saveCard();
    try{ await navigator.clipboard.writeText(location.href); }catch(e){}
  });
}
function saveCard(){
  const a=document.createElement('a');
  a.download='onlyone-voxel-art.png';
  a.href=document.getElementById('cardPrev').toDataURL('image/png');
  a.click();
}

/* ═════════ Init ═════════ */
applyLang();
</script>
